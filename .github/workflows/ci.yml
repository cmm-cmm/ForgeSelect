name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Typecheck workspaces (React/Vue wrappers)
        run: npm run typecheck --workspaces --if-present

      - name: Test workspaces with coverage (React/Vue wrappers)
        run: npm run test:coverage --workspaces --if-present

      - name: Build workspaces (React/Vue wrappers)
        run: npm run build --workspaces --if-present

      - name: Assemble site
        run: node scripts/build-site.mjs

      - name: Validate generated site
        run: node scripts/check-site.mjs

      - name: Validate npm package contents
        run: npm pack --dry-run --ignore-scripts && npm pack ./packages/react --dry-run --ignore-scripts && npm pack ./packages/vue --dry-run --ignore-scripts

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Browser tests
        run: npx playwright test
