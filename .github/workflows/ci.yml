name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-compatibility:
    name: Node ${{ matrix.node }} compatibility
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20.19", "24"]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Typecheck workspaces (React/Vue wrappers)
        run: npm run typecheck --workspaces --if-present

      - name: Test workspaces with coverage (React/Vue wrappers)
        run: npm run test:coverage --workspaces --if-present

      - name: Build workspaces (React/Vue wrappers)
        run: npm run build --workspaces --if-present

      - name: Assemble site
        run: node scripts/build-site.mjs

      - name: Validate generated site
        run: node scripts/check-site.mjs

      - name: Validate npm package contents
        run: npm pack --dry-run --ignore-scripts && npm pack ./packages/react --dry-run --ignore-scripts && npm pack ./packages/vue --dry-run --ignore-scripts

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Get installed Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Install Playwright OS dependencies only
        run: npx playwright install-deps chromium firefox webkit
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - name: Browser tests
        run: npx playwright test
