name: Publish to npm

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
      - "react-v*.*.*"
      - "vue-v*.*.*"
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - core
          - react
          - vue

permissions:
  contents: read
  id-token: write # needed for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Determine target package
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "package=${{ inputs.package }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF_NAME" == react-v* ]]; then
            echo "package=react" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF_NAME" == vue-v* ]]; then
            echo "package=vue" >> "$GITHUB_OUTPUT"
          else
            echo "package=core" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        if: github.event_name == 'push'
        env:
          PKG: ${{ steps.target.outputs.package }}
        run: |
          case "$PKG" in
            core) PREFIX="v"; MANIFEST="./package.json" ;;
            react) PREFIX="react-v"; MANIFEST="./packages/react/package.json" ;;
            vue) PREFIX="vue-v"; MANIFEST="./packages/vue/package.json" ;;
          esac
          TAG_VERSION="${GITHUB_REF_NAME#$PREFIX}"
          PKG_VERSION="$(node -p "require('$MANIFEST').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match $MANIFEST version $PKG_VERSION"
            exit 1
          fi

      - name: Build core library
        run: npm run build

      - name: Typecheck and test
        env:
          PKG: ${{ steps.target.outputs.package }}
        run: |
          if [ "$PKG" = "core" ]; then
            npm run typecheck
            npm test
          else
            npm run typecheck --workspace=packages/$PKG
            npm test --workspace=packages/$PKG
            npm run build --workspace=packages/$PKG
          fi

      - name: Publish
        env:
          PKG: ${{ steps.target.outputs.package }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "$PKG" = "core" ]; then
            npm publish --provenance
          else
            npm publish --workspace=packages/$PKG --provenance
          fi
